* { margin: 0; padding: 0; box-sizing: border-box; }

.summary-bar { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

@keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

<script>
const QUESTIONS = [{"id": 2701, "index": 1, "type": "multiple", "stem": "含胆固醇较高的食物有（ ）。", "options": {"A": "动物内脏", "B": "蛋黄", "C": "奶油", "D": "大豆", "E": "鱼肉"}, "answer": ["A", "B", "C", "E"], "explanation": "正确答案：A、B、C、E。选项解析：A.动物内脏；B.蛋黄；C.奶油；D.大豆；E.鱼肉。建议查阅教材相应章节巩固知识。", "module": "食物营养", "is_single": false}, {"id": 558, "index": 2, "type": "multiple", "stem": "控制细菌繁殖的措施包括熟（ ）、（ ）、（ ）、（ ）。", "options": {"A": "熟食快速冷却", "B": "饭菜加工后2小时内食用", "C": "具有潜在危害的食品冷冻冷藏保存", "D": "冷冻原料在冷藏条件下解冻"}, "answer": ["A", "B", "C", "D"], "explanation": "这些选项均是控制细菌繁殖的常见有效措施。A选项快速冷却熟食可抑制细菌生长；B选项饭菜 加工后2小时内食用，减少细菌繁殖时间；C选项潜在危害食品冷冻冷藏保存能抑制细菌活性；D选项冷冻原料 在冷藏条件下解冻，可避免温度过高致细菌大量繁殖。答案：ABCD", "module": "食品卫生", "is_single": false}, {"id": 2534, "index": 3, "type": "multiple", "stem": "下列对酒的风味、香型、色泽、口感等直接相关的成分有（ ）。", "options": {"A": "醛", "B": "醇", "C": "酯", "D": "有机酸", "E": "酚类"}, "answer": ["A", "B", "C", "D", "E"], "explanation": "醛、醇、酯、有机酸、酚类等都对酒的风味、香型、色泽、口感等方面有直接影响 。醛类赋予 酒特殊香气，醇类影响酒的醇厚感，酯类是形成酒香的重要成分，有机酸影响酒的酸度与口感，酚类物质对 酒的风味等也有作用 。答案：ABCDE", "module": "人群营养", "is_single": false}, {"id": 2854, "index": 4, "type": "multiple", "stem": "水产品的主要卫生问题包括以下几个方面（ ）。", "options": {"A": "腐败变质", "B": "寄生虫病", "C": "真菌及真菌毒素污染", "D": "工业废水污染"}, "answer": ["A", "B", "D"], "explanation": "水产品易因微生物作用腐败变质；部分水产品携带寄生虫，可导致寄生虫病；工业废水污染水 域会使水产品受污染。而真菌及真菌毒素污染相比前三者，不是水产品主要卫生问题。答案：ABD", "module": "人群营养", "is_single": false}, {"id": 770, "index": 5, "type": "multiple", "stem": "目前许多营养素没有UL值，下列说法错误的是（ ）。", "options": {"A": "过多摄入可能不会有危害", "B": "目前没有足够的资料来制定", "C": "不能说明这些营养素是绝对安全的", "D": "过多摄入这些营养素照样可能存在危险", "E": "说明这些营养素是绝对安全的"}, "answer": ["A", "E"], "explanation": "正确答案：A、E。选项解析：A.过多摄入可能不会有危害；B.目前没有足够的资料来制定；C.不能说明这些营养素是绝对安全的；D.过多摄入这些营养素照样可能存在危险；E.说明这些营养素是绝对安全的。建议查阅教材相应章节巩固知识。", "module": "食品卫生", "is_single": false}, {"id": 823, "index": 6, "type": "multiple", "stem": "《添加剂卫生管理办法》具体规定了添加剂的（ ）。", "options": {"A": "生产企业", "B": "品种", "C": "使用范围", "D": "使用量", "E": "销售企业"}, "answer": ["B", "C", "D"], "explanation": "《添加剂卫生管理办法》重点在于规范添加剂在食品生产等环节的使用，所以会具体规定添加 剂的品种、使用范围、使用量等，生产企业和销售企业并非该办法对添加剂本身的规定内容。答案：BCD", "module": "食品卫生", "is_single": false}, {"id": 355, "index": 7, "type": "multiple", "stem": "（ ）消费者除要求赔偿损失外，还可以向生产者或者销售者要求支付价款十倍的赔偿金。", "options": {"A": "生产不符合食品安全标准的食品", "B": "销售明知是不符合食品安全标准的食品", "C": "提供明显高于市场价的食品", "D": "超范围经营食品"}, "answer": ["A", "B"], "explanation": "根据食品安全相关法规，对于生产不符合食品安全标准的食品或销售明知是不符合食品安全标 准的食品，消费者有权利除要求赔偿损失外，还可要求支付价款十倍赔偿金。C选项提供高价食品、D选项超 范围经营食品并不直接对应此赔偿规定。答案：AB", "module": "食品卫生", "is_single": false}, {"id": 1280, "index": 8, "type": "multiple", "stem": "蛋白质过度加热出现的有害劣变产物的主要危害是（ ）。", "options": {"A": "致突变", "B": "致癌性", "C": "急性中毒", "D": "损害神经系统", "E": "降低蛋白质营养价值"}, "answer": ["A", "B", "E"], "explanation": "正确答案：A、B、E。选项解析：A.致突变；B.致癌性；C.急性中毒；D.损害神经系统；E.降低蛋白质营养价值。建议查阅教材相应章节巩固知识。", "module": "人群营养", "is_single": false}, {"id": 886, "index": 9, "type": "multiple", "stem": "（ ）缺乏可引起伤口愈合不良。", "options": {"A": "维生素C", "B": "铁", "C": "维生素B1", "D": "碘", "E": "锌"}, "answer": ["A", "E"], "explanation": "这道题问的是哪种营养素缺乏可引起伤口愈合不良。维生素C和锌是与伤口愈合密切相关的营养 素。维生素C参与胶原蛋白的合成，缺乏时会影响胶原纤维的形成，从而影响伤口愈合。锌是多种酶的组成成 分，对蛋白质合成和细胞分裂有重要作用，缺乏时也会影响伤口愈合。所以，正确答案是 A 和 E。答案：AE", "module": "膳食指南", "is_single": false}, {"id": 1615, "index": 10, "type": "multiple", "stem": "医学科普文章的思想性可体现在（ ）方面。", "options": {"A": "有积极向上的形式", "B": "文章反映的科学", "C": "适合读者对象阅读", "D": "为社会发展服务", "E": "体现为读者健康服务"}, "answer": ["A", "B", "C", "D", "E"], "explanation": "答案：ABCDE医学科普文章的思想性体现在多个方面，包括反映科学的正确性、适合读者的阅读 需求、为社会发展服务以及为读者健康服务，同时也包括有积极向上的形式。", "module": "人群营养", "is_single": false}, {"id": 3641, "index": 11, "type": "single", "stem": "镁在血浆中的存在形式为", "options": {"A": "游离镁和蛋白结合镁", "B": "游离镁", "C": "蛋白结合镁", "D": "游离镁、复合镁、蛋白结合镁"}, "answer": "D", "explanation": "镁在血浆中的存在形式为游离镁、复合镁、蛋白结合镁,比例分别为55%、13%和32%。", "module": "基础营养", "is_single": true}, {"id": 4247, "index": 12, "type": "single", "stem": "可能产生有害污染物的保藏方式是", "options": {"A": "辐照保藏法", "B": "微波杀菌法", "C": "高温灭菌法", "D": "熏制法"}, "answer": "D", "explanation": "《营养与食品卫生学》第9版P131 P330。熏制法可能带来致癌物污染的问题。 结构的特点是居住在地中海地区的居民所特有的，意大利、希腊居民的膳食可作为该种膳食结构的代表。该膳食结构的特点是富含植物性食物，每天食用适量的鱼、禽、少量蛋、奶酪和酸奶，每月食用畜肉的次数不多，主要的食用油是橄榄油，大部分成人有饮用葡萄酒的习惯。该膳食结构的突出特点是饱和脂肪摄入量低，不饱和脂肪摄入量高，膳食含大量复合碳水化合物，蔬菜、水果摄入量较高。", "module": "公共营养", "is_single": true}, {"id": 4534, "index": 28, "type": "single", "stem": "处于小康水平的居民，其Engel指数为", "options": {"A": "0.9", "B": "70%～79%", "C": "40%～49%", "D": "30%～39%"}, "answer": "C", "explanation": "《营养与食品卫生学》第9版P220。Engel指数是衡量一个国家或地区居民消费水平的标志，其中40%～49%为小康水平。", "module": "公共营养", "is_single": true}, {"id": 5519, "index": 29, "type": "single", "stem": "胃期胃液分泌的调节描述,错误的是", "options": {"A": "扩张刺激胃底胃体,通过迷走-迷走长反射", "B": "扩张刺激胃底胃体,通过壁内神经丛短反射", "C": "蛋白质消化产物引起促胃液素释放", "D": "盐酸进入小肠引起促胃液素释放"}, "answer": "D", "explanation": "《生理学》第9版P187。盐酸进入小肠不属于胃期胃液分泌的部分。故选D。", "module": "消化系统", "is_single": true}, {"id": 5623, "index": 30, "type": "single", "stem": "促进胰液分泌的因素有①迷走神经兴奋②交感神经兴奋③促胰液素④缩胆囊素", "options": {"A": "①②④", "B": "①③④", "C": "①②③", "D": "②③④"}, "answer": "B", "explanation": "《生理学》第9版P194。胰液分泌受神经和体液双重控制，促进胰液分泌的因素有迷走神经、促胰液素、缩胆囊素。", "module": "消化系统", "is_single": true}, {"id": 5630, "index": 31, "type": "single", "stem": "抑制胃酸分泌的因素有①盐酸②脂肪③高张溶液④阿托品", "options": {"A": "①②③", "B": "①②④", "C": "①③④", "D": "①②③④"}, "answer": "D", "explanation": "《生理学》第9版P187。抑制胃酸分泌的因素有盐酸、脂肪、高张溶液、阿托品。", "module": "消化系统", "is_single": true}, {"id": 6150, "index": 32, "type": "single", "stem": "下列哪种糖代谢途径既不生成也不消耗ATP或UTP", "options": {"A": "糖酵解", "B": "糖原合成", "C": "糖异生", "D": "糖原分解"}, "answer": "D", "explanation": "《生物化学与分子生物学》第9版P107。 糖酵解产能，糖原合成耗能，糖异生耗能。", "module": "糖代谢", "is_single": true}, {"id": 6316, "index": 33, "type": "single", "stem": "肝合成内源性甘油三酯时，甘油部分的主要来源是", "options": {"A": "酮体分解生成的丙酮", "B": "磷脂分解产生的3-磷酸甘油", "C": "葡萄糖分解生成的磷酸丙糖", "D": "葡萄糖分解生成的乙酰CoA"}, "answer": "C", "explanation": "《生物化学与分子生物学》第10版P150。 小肠黏膜细胞以甘油一酯途径合成甘油三酯；肝和脂肪细胞以甘油二酯途径合成甘油三酯，以糖酵解中间代谢产物磷酸二羟丙酮还原生成的甘油-3-磷酸为起始物，先合成1,2-甘油二酯，再生成甘油三酯。", "module": "脂质代谢", "is_single": true}, {"id": 5482, "index": 34, "type": "single", "stem": "使氧离曲线右移的因素 小板的活化、聚集，加速止血过程。血小板释放的TXA2具有强烈的聚集血小板和缩血管作用。", "module": "血液", "is_single": true}, {"id": 5157, "index": 40, "type": "single", "stem": "全血的比重主要决定于", "options": {"A": "血浆蛋白含量", "B": "渗透压的高低", "C": "红细胞数量", "D": "白细胞数量"}, "answer": "C", "explanation": "《生理学》第9版P59。正常人全血的比重为1.050-1.060。血液中红细胞数量越多，全血比重就越大。", "module": "血液", "is_single": true}, {"id": 6684, "index": 41, "type": "single", "stem": "仅见于心肌,且含量很高的是", "options": {"A": "LDH1", "B": "LDH5", "C": "CK3", "D": "CK2"}, "answer": "D", "explanation": "暂无解析", "module": "酶与酶促反应", "is_single": true}, {"id": 5757, "index": 42, "type": "single", "stem": "下丘脑视上核被损坏后,将出现下列哪种变化", "options": {"A": "尿量增加,尿浓缩", "B": "尿量增加,尿稀释", "C": "尿量减少,尿稀释", "D": "尿量减少,尿浓缩"}, "answer": "B", "explanation": "《生理学》第9版P246. 抗利尿激素（ADH),是一种九肽激素。它由位于下丘脑视上核和室旁核的神经内分泌细胞所合成。当创伤或者手术引起的下丘脑损伤，抗利尿激素合成和释放减少，会使集合管对水的重吸收减少，尿量明显增加，尿渗透压降低，尿稀释。", "module": "尿的生成和排出", "is_single": true}, {"id": 5756, "index": 43, "type": "single", "stem": "应急状态时,肾血流量减少主要是通过①交感神经系统活动加强,使肾血管收缩②肾上腺髓质分泌儿茶酚胺,使肾血管收缩③肾上腺皮质分泌盐皮质激素增多,儿茶酚胺作用加强④肾素分泌增多,直接收缩肾血管", "options": {"A": "②③④", "B": "①③④", "C": "①②④", "D": "①②③"}, "answer": "C", "explanation": "《生理学》第9版P231。在正常血压情况下，肾主要通过自身调节来保持肾血流量和肾小球滤过率的相对稳定，以维持正常的尿生成。但在紧急情况下，则通过交感神经和肾上腺髓质激素等使全身血量重新分配，减少肾血流量，以确保心、脑等重要器官的血液供应。肾交感神经兴奋时其末梢释放去甲肾上腺素，后者作用于球旁细胞膜中的β受体，可直接刺激肾素释放。如急性大失血，血量减少，血压下降，可反射性兴奋肾交感神经，从而使肾素释放增加。由肾上腺皮质球状带细胞合成分泌的盐皮质激素是醛固酮，而非儿茶酚胺。所以③选项是错的。", "module": "尿的生成和排出", "is_single": true}, {"id": 5786, "index": 44, "type": "single", "stem": "醛固酮作用的主要节段", "options": {"A": "血浆清除率为零", "B": "血浆清除率等于GFR", "C": "血浆清除率大于GFR(125ml/min)", "D": "血浆清除率小于GFR"}, "answer": "D", "explanation": "暂无解析", "module": "尿的生成和排出", "is_single": true}, {"id": 5698, "index": 45, "type": "single", "stem": "关于短期饥饿(1~3天)时机体代谢改变的特点,正确的是", "options": {"A": "脂肪动员减少", "B": "肝酮体生成减弱", "C": "肝糖异生作用减弱", "D": "骨骼肌蛋白质分解增强"}, "answer": "D", "explanation": "《生物化学与分子生物学》第9版P216。 短期饥饿后糖氧化供能减少而脂肪动员加强短期饥饿通常指1~3天未进食。由于进食18 小时后肝糖原基本耗尽，短期饥饿使血糖趋于降低，血中甘油和游离脂肪酸明显增加，氨基酸增加；胰岛素分泌极少，胰高血糖素分泌增加。机体的代谢呈 const userAnswers = {};

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const isSingle = q.is_single;
    const optionsHtml = Object.entries(q.options).map(([key, val]) =>
      `<div class="option ${isSingle?'option-single':'option-multi'}" data-q="${i}" data-key="${key}" onclick="selectOption(${i},'${key}',${isSingle})"><span class="option-key">${key}.</span><span>${val}</span></div>`
    ).join('');

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `qcard-${i}`;
    card.innerHTML = `
      <div class="q-header">
        <span class="q-number">#${i+1} <span style="font-weight:400;color:#999;font-size:13px">/ ${QUESTIONS.length}</span></span>
        <span><span class="q-type">${isSingle?'单选题':'多选题'}</span><span class="q-module">${q.module}</span></span>
      </div>
      <div class="q-stem">${q.stem}</div>
      <div class="options">${optionsHtml}</div>
      <div class="exp-toggle"><button id="expBtn-${i}" onclick="toggleExp(${i})" style="background:none;border:1px solid #d0d0d0;border-radius:6px;padding:4px 14px;font-size:13px;cursor:pointer;color:#667eea">📖 查看解析</button></div>
      <div class="explanation-box" id="exp-${i}">
        <div class="exp-label">📖 解析</div>
        <div>${q.explanation.replace('\n','<br>')}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

function selectOption(qIdx, key, isSingle) {
  const card = document.getElementById(`qcard-${qIdx}`);
  const opts = card.querySelectorAll('.option');
  if (isSingle) {
    opts.forEach(o => o.classList.remove('selected'));
    opts.forEach(o => {
      if (o.dataset.key === key) o.classList.add('selected');
    });
    userAnswers[qIdx] = [key];
  } else {
    const el = card.querySelector(`.option[data-key="${key}"]`);
    el.classList.toggle('selected');
    const selected = [...card.querySelectorAll('.option.selected')].map(o => o.dataset.key);
    userAnswers[qIdx] = selected.length > 0 ? selected : null;
  }
}

function toggleExp(qIdx) {
  const box = document.getElementById(`exp-${qIdx}`);
  const btn = document.getElementById(`expBtn-${qIdx}`);
  if (box.classList.contains('show')) {
    box.classList.remove('show');
    btn.innerHTML = '📖 查看解析';
  } else {
    box.classList.add('show');
    btn.innerHTML = '📎 收起解析';
  }
}

function submitQuiz() {
  let correct = 0, wrong = 0;
  QUESTIONS.forEach((q, i) => {
    const card = document.getElementById(`qcard-${i}`);
    const opts = card.querySelectorAll('.option');
    const exp = document.getElementById(`exp-${i}`);
    const correctAnswer = Array.isArray(q.answer) ? q.answer.slice().sort() : [q.answer];
    const userAns = userAnswers[i] || [];
    const isCorrect = userAns.length > 0 && JSON.stringify(userAns.slice().sort()) === JSON.stringify(correctAnswer);

    opts.forEach(o => o.classList.add('disabled'));
    if (isCorrect) {
      card.classList.add('correct');
      correct++;
    } else {
      card.classList.add('wrong');
      wrong++;
    }
    // Highlight correct/incorrect options
    opts.forEach(o => {
      const k = o.dataset.key;
      const isUser = userAns.includes(k);
      const isRight = correctAnswer.includes(k);
      if (isUser && isRight) o.classList.add('correct-answer');
      else if (isUser && !isRight) o.classList.add('wrong-answer');
      else if (!isUser && isRight) o.classList.add('correct-answer');
    });
    exp.classList.add('show');
  });

  const total = QUESTIONS.length;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  document.getElementById('scoreBadge').innerHTML = `${correct}/${total} (${pct}%)`;
  document.getElementById('scoreBadge').style.color = pct >= 70 ? '#52c41a' : pct >= 50 ? '#faad14' : '#ff4d4f';

  // Update summary
  document.getElementById('summaryTotal').textContent = total;
  document.getElementById('summaryCorrect').textContent = correct;
  document.getElementById('summaryWrong').textContent = wrong;
  document.getElementById('summaryRate').textContent = pct + '%';
  document.getElementById('summaryBar').classList.add('show');

  // Scroll to top
  window.scrollTo({top: 0, behavior: 'smooth'});

  // Show wrong list with detail
  const wrongIndices = [];
  const wrongDetails = [];
  QUESTIONS.forEach((q, i) => {
    const card = document.getElementById(`qcard-${i}`);
    if (card.classList.contains('wrong')) {
      wrongIndices.push(i + 1);
      const userAns = userAnswers[i] || [];
      const correctAnswer = Array.isArray(q.answer) ? q.answer.slice().sort() : [q.answer];
      wrongDetails.push({
        idx: i + 1,
        id: q.id,
        module: q.module,
        stem: q.stem,
        userAnswer: userAns.length ? userAns.join(', ') : '（未作答）',
        correctAnswer: correctAnswer.join(', '),
      });
    }
  });
  const wrongNumsEl = document.getElementById('wrongNums');
  const detailText = document.getElementById('wrongDetailText');
  if (wrongIndices.length > 0) {
    wrongNumsEl.innerHTML = wrongIndices.map(n => `<span>#${n}</span>`).join('');
    // Build detail text for copying
    let text = '===== RD 错题报告 =====\n';
    text += '共 ' + wrongIndices.length + ' 题\n\n';
    wrongDetails.forEach((w, i) => {
      text += '--- 第' + w.idx + '题 ---\n';
      text += '题号: ' + w.idx + '  (数据库ID: ' + w.id + ')\n';
      text += '模块: ' + w.module + '\n';
      text += '题干: ' + w.stem + '\n';
      text += '你的答案: ' + w.userAnswer + '\n';
      text += '正确答案: ' + w.correctAnswer + '\n';
      text += '——————————————\n';
    });
    text += '\n请帮我分析这些错题的错因和薄弱点。';
    detailText.value = text;
    document.getElementById('wrongList').classList.add('show');
    document.getElementById('copyWrongBtn').style.display = '';
  } else {
    wrongNumsEl.innerHTML = '<span style="color:#52c41a;font-weight:600;">🎉 全部正确！</span>';
    detailText.value = '🎉 全部正确，太棒了！';
    document.getElementById('wrongList').classList.add('show');
    document.getElementById('copyWrongBtn').style.display = 'none';
  }
}

function resetQuiz() {
  Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
  QUESTIONS.forEach((q, i) => {
    const card = document.getElementById(`qcard-${i}`);
    card.className = 'question-card';
    card.querySelectorAll('.option').forEach(o => {
      o.classList.remove('selected', 'correct-answer', 'wrong-answer', 'disabled');
    });
    document.getElementById(`exp-${i}`).classList.remove('show');
  });
  document.getElementById('scoreBadge').innerHTML = '待提交';
  document.getElementById('scoreBadge').style.color = '#667eea';
  document.getElementById('wrongList').classList.remove('show');
  document.getElementById('copyWrongBtn').style.display = 'none';
}

function copyWrongDetail() {
  const ta = document.getElementById('wrongDetailText');
  ta.select();
  ta.setSelectionRange(0, 999999);
  try {
    navigator.clipboard.writeText(ta.value).then(() => {
      alert('✅ 已复制错题详情，请发给教练分析！');
    }).catch(() => {
      document.execCommand('copy');
      alert('✅ 已复制，请发给教练分析！');
    });
  } catch(e) {
    document.execCommand('copy');
    alert('✅ 已复制，请发给教练分析！');
  }
}

function copyWrongAnswers() {
  const wrongIndices = [];
  QUESTIONS.forEach((q, i) => {
    const card = document.getElementById(`qcard-${i}`);
    if (card.classList.contains('wrong')) wrongIndices.push(i + 1);
  });
  if (wrongIndices.length === 0) {
    alert('🎉 全部正确，没有错题！');
    return;
  }
  const text = wrongIndices.join(', ');
  navigator.clipboard.writeText(text).then(() => {
    alert(`✅ 已复制错题号：${text}`);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert(`✅ 已复制错题号：${text}`);
  });
}
